<aside class="sidebar">
  <div class="brand">
    <div class="brand__mark">YC</div>
    <div>
      <h1>YogeCode Search</h1>
      <p>Observability Console</p>
    </div>
  </div>

  <div class="sidebar__section">
    <p class="sidebar__label">Navigation</p>
    <nav class="nav">
      @for (item of items; track item.route) {
        <a
          class="nav__item"
          [routerLink]="item.route"
          routerLinkActive="nav__item--active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }">
          <span class="nav__tag">{{ item.tag }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>
</aside>
